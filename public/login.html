<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockroom — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:        #161310;
    --panel:      #1f1b16;
    --panel-2:    #2a241d;
    --paper:      #ece5d6;
    --amber:      #e8a33d;
    --amber-dim:  #8a5f24;
    --rust:       #c1502e;
    --line:       #4a4034;
    --text-dim:   #b6ac99;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 18% 20%, rgba(232,163,61,0.06), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(193,80,46,0.07), transparent 50%),
      var(--ink);
    font-family:'JetBrains Mono', monospace;
    color:var(--paper);
    padding:24px;
    overflow:hidden;
    position:relative;
  }

  /* faint warehouse grid floor */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(circle at 50% 40%, rgba(0,0,0,0.9), transparent 75%);
    pointer-events:none;
  }

  .card{
    position:relative;
    width:100%;
    max-width:380px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:44px 38px 36px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.02) inset;
    animation:rise 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* punch-hole tag notch, top */
  .notch{
    position:absolute;
    top:-13px;
    left:50%;
    transform:translateX(-50%);
    width:26px;
    height:26px;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:50%;
  }
  .notch::after{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #322c23, var(--ink));
  }

  .tag-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:6px;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--amber);
    text-transform:uppercase;
  }

  .sku{
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.05em;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:-0.01em;
    margin:6px 0 4px;
    color:var(--paper);
  }

  .sub{
    font-size:12.5px;
    color:var(--text-dim);
    margin:0 0 28px;
    line-height:1.5;
  }

  .dash{
    border:none;
    border-top:1px dashed var(--line);
    margin:0 0 28px;
  }

  label{
    display:block;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:8px;
  }

  .field{
    margin-bottom:20px;
    position:relative;
  }

  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:3px;
    padding:13px 14px 13px 38px;
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    color:var(--paper);
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .field input::placeholder{ color:#6e6354; }

  .field input:focus{
    border-color:var(--amber);
    background:#241f18;
    box-shadow:0 0 0 3px rgba(232,163,61,0.12);
  }

  .icon{
    position:absolute;
    left:13px;
    top:38px;
    width:15px;
    height:15px;
    color:var(--amber-dim);
    pointer-events:none;
    transition:color .18s ease;
  }

  .field input:focus ~ .icon,
  .field:focus-within .icon{
    color:var(--amber);
  }

  .btn{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:3px;
    background:var(--amber);
    color:#1c1812;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease, box-shadow .15s ease;
  }

  .btn:hover{
    background:#f0b052;
    box-shadow:0 8px 22px -8px rgba(232,163,61,0.45);
  }
  .btn:active{ transform:translateY(1px); }

  .foot{
    margin-top:22px;
    text-align:center;
    font-size:11px;
    color:#6e6354;
    letter-spacing:0.04em;
  }

  .barcode{
    display:flex;
    gap:2px;
    align-items:flex-end;
    height:18px;
    margin:24px 0 4px;
    opacity:0.5;
  }
  .barcode span{
    display:block;
    background:var(--text-dim);
    width:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ animation:none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="notch"></div>

    <div class="tag-row">
      <span class="eyebrow">Stockroom</span>
      <span class="sku">NO. 0417-A</span>
    </div>

    <h1>Sign in</h1>
    <p class="sub">Access the inventory floor. Enter your credentials to continue.</p>

    <hr class="dash">

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="" autocomplete="username">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="3.4"></circle>
          <path d="M5 20c0-3.6 3.1-6.4 7-6.4s7 2.8 7 6.4"></path>
        </svg>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="5" y="10.5" width="14" height="9.5" rx="1.6"></rect>
          <path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"></path>
        </svg>
      </div>

      <button type="submit" class="btn">Enter stockroom</button>
    </form>

    <div class="barcode" aria-hidden="true">
      <span style="height:100%"></span><span style="height:60%"></span><span style="height:90%"></span>
      <span style="height:45%"></span><span style="height:100%"></span><span style="height:70%"></span>
      <span style="height:55%"></span><span style="height:100%"></span><span style="height:65%"></span>
      <span style="height:90%"></span><span style="height:40%"></span><span style="height:100%"></span>
      <span style="height:75%"></span><span style="height:55%"></span><span style="height:95%"></span>
    </div>
    <p class="foot">Stockroom Admin · Inventory & Access Control</p>
  </div>

  <script type="module">

    const redirectIfLoggedIn = async () =>{
        let res = await fetch("https://products-dashboard-xt6c.onrender.com/auth/status")
        if(res.ok){
            res = await res.json()
            if(res.authenticated)
                location.replace("/")
        }
    }
    await redirectIfLoggedIn()
  </script>
</body>
</html>
